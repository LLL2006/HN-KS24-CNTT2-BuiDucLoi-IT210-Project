<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/main-layout :: head('Lịch sử học thuật')}"></head>

<body class="app-page">

<div th:replace="~{layout/main-layout :: sidebar(${sessionUser.role.name()}, 'history')}"></div>

<div class="main-content">

    <div th:replace="~{layout/main-layout :: topbar(
        'Lịch sử học thuật',
        'Xem lại các buổi tư vấn và thiết bị đã được hỗ trợ')}">
    </div>

    <div class="container-fluid mt-4">

        <div th:replace="~{layout/main-layout :: alerts}"></div>

        <div class="row">

            <div class="col-12">

                <div class="app-card shadow-sm border-0">

                    <div class="card-body p-4">

                        <div class="d-flex justify-content-between align-items-center mb-4">

                            <h4 class="mb-0">
                                Lịch sử tư vấn học thuật
                            </h4>

                        </div>

                        <div class="table-responsive">

                            <table class="table table-hover align-middle">
                                <thead>
                                <tr>
                                    <th>Ngày</th>
                                    <th>Giảng viên</th>
                                    <th>Chuyên ngành</th>
                                    <th>Chủ đề</th>
                                    <th>Mức năng lực</th>
                                    <th>Thiết bị hỗ trợ</th>
                                    <th>Trạng thái</th>
                                    <th class="text-center">Thao tác</th> </tr>
                                </thead>

                                <tbody>
                                <tr th:if="${#lists.isEmpty(histories)}">
                                    <td colspan="8" class="text-center text-muted py-4"> Chưa có lịch sử tư vấn
                                    </td>
                                </tr>

                                <tr th:each="history : ${histories}">
                                    <td th:text="${#temporals.format(history.startTime, 'dd/MM/yyyy HH:mm')}"></td>
                                    <td th:text="${history.lecturerName}"></td>
                                    <td th:text="${history.departmentName}"></td>
                                    <td th:text="${history.topic}"></td>
                                    <td>
                                        <span class="badge badge-info" th:text="${history.abilityLevel}"></span>
                                    </td>
                                    <td>
                                        <ul class="mb-0 pl-3">
                                            <li th:each="equipment : ${history.borrowedEquipments}">
                                                <span th:text="${equipment.equipmentName}"></span> -
                                                <span th:text="${equipment.quantity}"></span>
                                            </li>
                                        </ul>
                                    </td>
                                    <td>
                <span class="badge"
                      th:if="${history.status != null}"
                      th:classappend="
                        ${history.status.name() == 'PENDING'} ? 'badge-warning' :
                        (${history.status.name() == 'CONFIRMED'} ? 'badge-primary' :
                        (${history.status.name() == 'COMPLETED'} ? 'badge-success' :
                        (${history.status.name() == 'CANCELLED'} ? 'badge-danger' :
                        'badge-secondary')))
                      "
                      th:text="
                        ${history.status.name() == 'PENDING'} ? 'Chờ xác nhận' :
                        (${history.status.name() == 'CONFIRMED'} ? 'Đã tiếp nhận' :
                        (${history.status.name() == 'COMPLETED'} ? 'Hoàn thành' :
                        (${history.status.name() == 'CANCELLED'} ? 'Đã hủy' :
                        history.status)))
                      ">
                </span>
                                    </td>
                                    <td class="text-center">
                                        <a th:if="${history.status.name() == 'COMPLETED'}"
                                           th:href="@{/student/history/{id}(id=${history.sessionId})}"
                                           class="btn btn-sm btn-light text-primary border">
                                            <i class="fas fa-eye mr-1"></i> Chi tiết
                                        </a>
                                        <span th:unless="${history.status.name() == 'COMPLETED'}" class="text-muted small">-</span>
                                    </td>
                                </tr>
                                </tbody>
                            </table>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<div th:replace="~{layout/main-layout :: scripts}"></div>

</body>
</html>
