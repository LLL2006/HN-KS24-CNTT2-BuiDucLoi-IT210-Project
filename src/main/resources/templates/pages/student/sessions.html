<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/main-layout :: head('Lịch tư vấn của tôi')}"></head>

<body class="app-page">

<div th:replace="~{layout/main-layout :: sidebar(${sessionUser.role.name()}, 'sessions')}"></div>

<div class="main-content">

    <div th:replace="~{layout/main-layout :: topbar(
        'Lịch tư vấn của tôi',
        'Quản lý và theo dõi các buổi hỗ trợ từ giảng viên')}">
    </div>

    <div class="container-fluid mt-4">
        <div th:replace="~{layout/main-layout :: alerts}"></div>

        <div class="row">
            <div class="col-12">
                <div class="app-card shadow-sm border-0">
                    <div class="card-body p-4">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                <tr>
                                    <th>Ngày tư vấn</th>
                                    <th>Khung giờ</th>
                                    <th>Giảng viên</th>
                                    <th>Trạng thái</th>
                                    <th class="text-center">Thao tác</th> </tr>
                                </thead>
                                <tbody>
                                <tr th:each="s : ${sessions}">
                                    <td th:text="${#temporals.format(s.startTime, 'dd/MM/yyyy')}"></td>

                                    <td>
                                        <span class="font-weight-bold" th:text="${#temporals.format(s.startTime, 'HH:mm')}"></span>
                                        <span class="text-muted mx-1">-</span>
                                        <span class="font-weight-bold" th:text="${#temporals.format(s.endTime, 'HH:mm')}"></span>
                                    </td>

                                    <td th:text="${s.lecturer.user.profile.fullName}"></td>

                                    <td>
            <span class="badge px-3 py-2"
                  th:classappend="
                    ${s.status.name() == 'PENDING'} ? 'badge-warning' :
                    (${s.status.name() == 'CONFIRMED'} ? 'badge-primary' :
                    (${s.status.name() == 'COMPLETED'} ? 'badge-success' :
                    (${s.status.name() == 'CANCELLED'} ? 'badge-danger' :
                    'badge-secondary')))
                  "
                  th:text="
                    ${s.status.name() == 'PENDING'} ? 'Chờ xác nhận' :
                    (${s.status.name() == 'CONFIRMED'} ? 'Đã tiếp nhận' :
                    (${s.status.name() == 'COMPLETED'} ? 'Hoàn thành' :
                    (${s.status.name() == 'CANCELLED'} ? 'Đã hủy' :
                    s.status)))
                  ">
            </span>
                                    </td>

                                    <td class="text-center">
                                        <th:block th:if="${s.status.name() != 'CANCELLED' && s.status.name() != 'COMPLETED'}">

                                            <form th:if="${T(java.time.LocalDateTime).now().isBefore(s.startTime.minusHours(24))}"
                                                  th:action="@{/student/sessions/{id}/cancel(id=${s.id})}"
                                                  method="post" class="d-inline">
                                                <button type="submit" class="btn btn-outline-danger btn-sm"
                                                        onclick="return confirm('Bạn có chắc chắn muốn hủy lịch tư vấn này không?')">
                                                    <i class="fas fa-calendar-times mr-1"></i> Hủy lịch
                                                </button>
                                            </form>

                                            <span th:unless="${T(java.time.LocalDateTime).now().isBefore(s.startTime.minusHours(24))}"
                                                  class="text-muted small" title="Không thể hủy lịch trước ca tư vấn dưới 24 giờ">
            <i class="fas fa-lock mr-1"></i> Không thể hủy
        </span>
                                        </th:block>

                                        <a th:if="${s.status.name() == 'COMPLETED'}"
                                           th:href="@{'/student/history/' + ${s.id}}"
                                           class="btn btn-sm btn-outline-primary">
                                            <i class="fas fa-eye"></i> Kết quả
                                        </a>

                                        <span th:if="${s.status.name() == 'CANCELLED'}" class="text-muted small">—</span>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout/main-layout :: scripts}"></div>

</body>
</html>
