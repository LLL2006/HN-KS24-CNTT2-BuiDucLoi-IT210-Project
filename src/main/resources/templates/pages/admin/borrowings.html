<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/main-layout :: head('Quản lý cấp phát')}"></head>

<body class="app-page">

<div th:replace="~{layout/main-layout :: sidebar(${sessionUser.role.name()}, 'borrowings')}"></div>

<div class="main-content">

    <div th:replace="~{layout/main-layout :: topbar('Quản lý cấp phát','Danh sách phiếu mượn thiết bị')}"></div>

    <div class="container-fluid mt-4">

        <div th:replace="~{layout/main-layout :: alerts}"></div>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="mb-0">Danh sách phiếu mượn</h3>
        </div>

        <div class="app-card shadow-sm border-0">

            <div class="card-body p-4">

                <table class="table table-hover table-custom align-middle">

                    <thead>
                    <tr>
                        <th>Sinh viên</th>
                        <th>Chủ đề tư vấn</th>
                        <th>Chi tiết thiết bị</th>
                        <th>Trạng thái</th>
                        <th width="260" class="text-center">Hành động</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="record : ${borrowings}">

                        <td>

                            <div class="font-weight-bold"
                                 th:text="${record.session.student.profile.fullName}">
                            </div>

                            <small class="text-muted"
                                   th:text="${record.session.student.username}">
                            </small>

                        </td>

                        <td th:text="${record.session.topic}"></td>

                        <td>

                            <ul class="mb-0 pl-3 small">

                                <li th:each="detail : ${record.details}">

                                    <span class="font-weight-bold"
                                          th:text="${detail.equipment.name}">
                                    </span>

                                    -

                                    SL:
                                    <span th:text="${detail.quantity}"></span>

                                </li>

                            </ul>

                        </td>

                        <td>

                            <span class="badge badge-warning px-3 py-2"
                                  th:if="${record.status.name() == 'PENDING_ALLOCATION'}">

                                Chờ cấp phát

                            </span>

                            <span class="badge badge-success px-3 py-2"
                                  th:if="${record.status.name() == 'EXPORTED'}">

                                Đã xuất kho

                            </span>

                            <span class="badge badge-danger px-3 py-2"
                                  th:if="${record.status.name() == 'REJECTED'}">

                                Đã từ chối

                            </span>

                            <span class="badge badge-primary px-3 py-2"
                                  th:if="${record.status.name() == 'RETURNED'}">

                                Đã trả

                            </span>

                        </td>

                        <td class="text-center">
                            <div class="d-flex justify-content-center align-items-center flex-wrap" style="gap: 5px;">

                                <form th:if="${record.status.name() == 'PENDING_ALLOCATION'}"
                                      th:action="@{/admin/borrowings/{id}/approve(id=${record.id})}"
                                      method="post" class="m-0">
                                    <button class="btn btn-sm btn-success">
                                        <i class="fas fa-check"></i> Xuất kho
                                    </button>
                                </form>

                                <form th:if="${record.status.name() == 'PENDING_ALLOCATION'}"
                                      th:action="@{/admin/borrowings/{id}/reject(id=${record.id})}"
                                      method="post" class="m-0">
                                    <button class="btn btn-sm btn-danger">
                                        <i class="fas fa-times"></i> Từ chối
                                    </button>
                                </form>

                                <form th:if="${record.status.name() == 'EXPORTED'}"
                                      th:action="@{/admin/borrowings/{id}/return(id=${record.id})}"
                                      method="post" class="m-0">
                                    <button class="btn btn-sm btn-primary">
                                        <i class="fas fa-undo"></i> Xác nhận trả
                                    </button>
                                </form>

                                <a th:href="@{/admin/borrowings/{id}(id=${record.id})}"
                                   class="btn btn-sm btn-info">
                                    <i class="fas fa-info-circle"></i> Chi tiết
                                </a>

                            </div>
                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(borrowings)}">

                        <td colspan="5"
                            class="text-center text-muted py-4">

                            Không có phiếu mượn nào cần xử lý.

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<div th:replace="~{layout/main-layout :: scripts}"></div>

</body>
</html>
