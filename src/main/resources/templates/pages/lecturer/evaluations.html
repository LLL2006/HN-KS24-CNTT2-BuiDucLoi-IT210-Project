<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/main-layout :: head('Đánh giá sinh viên')}"></head>

<body class="app-page">

<div th:replace="~{layout/main-layout :: sidebar(${sessionUser.role.name()}, 'evaluations')}"></div>

<div class="main-content">

    <div th:replace="~{layout/main-layout :: topbar(
        'Đánh giá sinh viên',
        'Danh sách các ca cần đánh giá')}">
    </div>

    <div class="container-fluid mt-4">

        <div th:replace="~{layout/main-layout :: alerts}"></div>

        <div class="row">

            <div class="col-12">

                <div class="app-card shadow-sm border-0">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h4 class="mb-0 text-primary font-weight-bold">
                                <i class="fas fa-calendar-check mr-2"></i>Quản lý đánh giá
                            </h4>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                <tr>
                                    <th>Sinh viên</th>
                                    <th>Chủ đề</th>
                                    <th>Thời gian</th>
                                    <th>Trạng thái</th>
                                    <th width="200" class="text-center">Thao tác</th>
                                </tr>
                                </thead>

                                <tbody>
                                <tr th:if="${#lists.isEmpty(sessions)}">
                                    <td colspan="5" class="text-center text-muted py-5">
                                        <i class="fas fa-folder-open fa-3x mb-3 d-block opacity-50"></i>
                                        Hiện không có ca tư vấn nào cần xử lý.
                                    </td>
                                </tr>

                                <tr th:each="s : ${sessions}">
                                    <td>
                                        <div class="font-weight-bold text-dark" th:text="${s.student.profile.fullName}"></div>
                                        <small class="text-muted" th:text="${s.student.username}"></small>
                                    </td>

                                    <td th:text="${s.topic}" class="text-wrap" style="max-width: 200px;"></td>

                                    <td>
                                        <div class="small">
                                            <i class="far fa-calendar-alt text-muted mr-1"></i>
                                            <span th:text="${#temporals.format(s.startTime, 'dd/MM/yyyy')}"></span>
                                        </div>
                                        <div class="small">
                                            <i class="far fa-clock text-muted mr-1"></i>
                                            <span class="font-weight-bold" th:text="${#temporals.format(s.startTime, 'HH:mm')}"></span>
                                            <span class="mx-1">-</span>
                                            <span class="font-weight-bold" th:text="${#temporals.format(s.endTime, 'HH:mm')}"></span>
                                        </div>
                                    </td>

                                    <td>
                        <span class="badge px-3 py-2"
                              th:classappend="
                                ${s.status.name() == 'PENDING'} ? 'badge-warning' :
                                (${s.status.name() == 'CONFIRMED'} ? 'badge-primary' :
                                (${s.status.name() == 'COMPLETED'} ? 'badge-success' :
                                (${s.status.name() == 'CANCELLED'} ? 'badge-danger' : 'badge-secondary')))
                              "
                              th:text="
                                ${s.status.name() == 'PENDING'} ? 'Chờ xác nhận' :
                                (${s.status.name() == 'CONFIRMED'} ? 'Đã tiếp nhận' :
                                (${s.status.name() == 'COMPLETED'} ? 'Hoàn thành' : 'Đã hủy'))
                              ">
                        </span>
                                    </td>

                                    <td class="text-center">
                                        <div class="d-flex justify-content-center flex-wrap" style="gap: 5px;">

                                            <form th:if="${s.status.name() == 'PENDING'}"
                                                  th:action="@{/lecturer/sessions/{id}/accept(id=${s.id})}" method="post">
                                                <button class="btn btn-sm btn-success">
                                                    <i class="fas fa-check mr-1"></i>Tiếp nhận
                                                </button>
                                            </form>

                                            <form th:if="${s.status.name() == 'PENDING'}"
                                                  th:action="@{/lecturer/sessions/{id}/reject(id=${s.id})}" method="post">
                                                <button class="btn btn-sm btn-danger">
                                                    <i class="fas fa-times mr-1"></i>Từ chối
                                                </button>
                                            </form>

                                            <a th:if="${s.status.name() == 'CONFIRMED'}"
                                               th:href="@{/lecturer/sessions/{id}/evaluate(id=${s.id})}"
                                               class="btn btn-primary btn-sm">
                                                <i class="fas fa-edit mr-1"></i>Nhập đánh giá
                                            </a>

                                            <a th:if="${s.status.name() == 'COMPLETED'}"
                                               th:href="@{/lecturer/evaluations/{id}(id=${s.id})}"
                                               class="btn btn-outline-info btn-sm">
                                                <i class="fas fa-eye mr-1"></i>Kết quả
                                            </a>

                                            <span th:if="${s.status.name() == 'CANCELLED'}" class="text-muted small">—</span>
                                        </div>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>

</div>

<div th:replace="~{layout/main-layout :: scripts}"></div>

</body>
</html>
