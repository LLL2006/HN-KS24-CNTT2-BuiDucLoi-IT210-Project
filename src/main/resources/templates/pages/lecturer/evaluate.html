<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/main-layout :: head('Đánh giá sinh viên')}"></head>

<body class="app-page">

<div th:replace="~{layout/main-layout :: sidebar(${sessionUser.role.name()}, 'sessions')}"></div>

<div class="main-content">

    <div th:replace="~{layout/main-layout :: topbar(
        'Đánh giá sinh viên',
        'Nhập đánh giá năng lực và đề xuất thiết bị')}">
    </div>

    <div class="container-fluid mt-4">

        <div th:replace="~{layout/main-layout :: alerts}"></div>

        <div class="row">
            <div class="col-12">

                <div class="app-card shadow-sm border-0">
                    <div class="card-body p-4">

                        <h4 class="mb-4 text-dark font-weight-bold">Phiếu đánh giá học thuật</h4>

                        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="fas fa-exclamation-circle mr-2"></i>
                            <span th:text="${error}"></span>
                            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                <span aria-hidden="true">&times;</span>
                            </button>
                        </div>
                        <form th:action="@{/lecturer/evaluations}"
                              th:object="${evaluationRequest}"
                              method="post">

                            <input type="hidden" th:field="*{sessionId}">

                            <div class="form-group mb-4">
                                <label class="font-weight-bold text-dark">Nội dung đánh giá</label>

                                <textarea class="form-control custom-textarea"
                                          rows="4"
                                          th:field="*{content}"
                                          placeholder="Nhập nhận xét chi tiết về năng lực học thuật của sinh viên..."></textarea>

                                <div class="text-danger small mt-1"
                                     th:if="${#fields.hasErrors('content')}"
                                     th:errors="*{content}"></div>
                            </div>

                            <div class="form-group mb-4">
                                <label class="font-weight-bold text-dark">Mức năng lực</label>

                                <select class="form-control custom-select-control"
                                        th:field="*{abilityLevel}">

                                    <option value="">-- Chọn mức năng lực --</option>
                                    <option value="Yêu">Yếu</option>
                                    <option value="Trung bình">Trung bình</option>
                                    <option value="Khá">Khá</option>
                                    <option value="Giỏi">Giỏi</option>
                                    <option value="Xuất sắc">Xuất sắc</option>

                                </select>

                                <div class="text-danger small mt-1"
                                     th:if="${#fields.hasErrors('abilityLevel')}"
                                     th:errors="*{abilityLevel}"></div>
                            </div>

                            <div class="mb-3 d-flex justify-content-between align-items-center">
                                <label class="font-weight-bold text-dark mb-0">Thiết bị đề xuất</label>
                                <button type="button"
                                        class="btn btn-sm btn-outline-primary"
                                        style="border-radius: 8px;"
                                        onclick="addEquipment()">
                                    <i class="fas fa-plus mr-1"></i> Thêm thiết bị
                                </button>
                            </div>

                            <div id="equipmentContainer" class="mb-4"></div>

                            <hr class="my-4">

                            <div class="text-left">
                                <button type="submit" class="btn btn-success px-5 py-2 font-weight-bold shadow-sm"
                                        style="border-radius: 10px;">
                                    <i class="fas fa-save mr-2"></i> Lưu đánh giá & Cấp thiết bị
                                </button>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>

    </div>
</div>

<div th:replace="~{layout/main-layout :: scripts}"></div>

<style>
    /* Fix lỗi nuốt chữ: Dùng padding thay vì line-height cứng */
    .custom-select-control {
        height: 48px !important;
        padding: 8px 15px !important;
        border-radius: 10px;
        border: 1px solid #ced4da;
        appearance: auto !important; /* Hiện mũi tên dropdown chuẩn của trình duyệt */
    }

    .custom-textarea {
        border-radius: 10px;
        padding: 15px !important;
        border: 1px solid #ced4da;
    }

    .equipment-row {
        background: #fdfdfd;
        border: 1px solid #eee;
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 12px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.02);
    }

    .btn-circle-delete {
        width: 48px;
        height: 48px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
</style>

// Tìm đoạn script ở cuối file và thay bằng đoạn này
<script th:inline="javascript">
    const availableEquipments = /*[[${equipments}]]*/ [];
    // Lấy dữ liệu cũ từ server nếu có lỗi xảy ra
    const oldEquipments = /*[[${evaluationRequest.equipments}]]*/ [];

    function addEquipment(oldData = null) {
        const container = document.getElementById("equipmentContainer");
        const index = container.children.length;

        let optionsHtml = '<option value="">-- Chọn thiết bị --</option>';
        availableEquipments.forEach(e => {
            // Kiểm tra xem có phải là thiết bị đã chọn trước đó không
            const selected = (oldData && e.id == oldData.equipmentId) ? 'selected' : '';
            optionsHtml += `<option value="${e.id}" ${selected}>${e.name}</option>`;
        });

        const initialQty = oldData ? oldData.quantity : 1;

        const html = `
<div class="equipment-row d-flex justify-content-between align-items-center animate__animated animate__fadeIn">
    <div class="flex-grow-1 mr-3">
        <select name="equipments[${index}].equipmentId" id="select-${index}"
                class="form-control custom-select-control" onchange="updateDeposit(${index})">
            ${optionsHtml}
        </select>
    </div>
    <div class="d-flex align-items-center">
        <div class="input-group mr-2" style="width: 230px;">
            <div class="input-group-prepend"><span class="input-group-text bg-light text-muted small font-weight-bold">Tổng cọc</span></div>
            <input type="text" id="deposit-${index}" class="form-control bg-white text-danger font-weight-bold" readonly placeholder="0 VNĐ" style="height: 48px;">
        </div>
        <div class="input-group" style="width: 100px;">
            <div class="input-group-prepend"><span class="input-group-text bg-light text-muted font-weight-bold">SL</span></div>
            <input type="number" id="quantity-${index}" name="equipments[${index}].quantity"
                   class="form-control" min="1" value="${initialQty}" oninput="updateDeposit(${index})" style="height: 48px;">
        </div>
        <button type="button" class="btn btn-danger btn-circle-delete ml-3" onclick="this.parentElement.parentElement.remove()"><i class="fas fa-trash"></i></button>
    </div>
</div>`;
        container.insertAdjacentHTML("beforeend", html);
        updateDeposit(index); // Tính lại tiền cọc ngay khi vẽ ra
    }

    function updateDeposit(index) {
        const select = document.getElementById(`select-${index}`);
        if(!select) return;
        const equipmentId = select.value;
        const quantity = document.getElementById(`quantity-${index}`).value;
        const depositInput = document.getElementById(`deposit-${index}`);
        const equipment = availableEquipments.find(e => e.id == equipmentId);

        if (equipment && equipment.depositAmount > 0) {
            depositInput.value = new Intl.NumberFormat('vi-VN').format(equipment.depositAmount * quantity) + " VNĐ";
        } else {
            depositInput.value = "Miễn phí";
        }
    }

    window.onload = function() {
        if (oldEquipments && oldEquipments.length > 0) {
            // Nếu có lỗi, vẽ lại toàn bộ danh sách thiết bị đã chọn
            oldEquipments.forEach(item => addEquipment(item));
        } else {
            addEquipment();
        }
    };
</script>
</body>
</html>
