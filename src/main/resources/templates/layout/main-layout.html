<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title th:text="${title} + ' | Smart Lab'">Smart Lab</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"/>

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>

    <style>
        :root{
            --primary:#764ba2;
            --primary-dark:#5b3a85;
            --primary-light:#9f7aea;

            --secondary:#667eea;

            --success:#28a745;
            --danger:#dc3545;
            --warning:#ffc107;
            --info:#17a2b8;

            --text:#2d3748;
            --muted:#718096;

            --border:#e2e8f0;
            --bg:#f5f3fa;

            --sidebar-width:260px;
            --topbar-height:70px;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#667eea 0%, #764ba2 100%);
    background-attachment:fixed;
    color:var(--text);
    margin: 0;
    overflow-x: hidden;
}

.custom-select {
    height: 48px !important;
    line-height: 48px !important;
    padding-top: 0 !important;
    padding-bottom: 0 !important;
}

        a{
            text-decoration:none !important;
        }

        body.auth-page{
            min-height:100vh;
            background:linear-gradient(135deg,var(--secondary),var(--primary));
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }

        .auth-card{
            width:100%;
            max-width:460px;
            background:#fff;
            border:none;
            border-radius:20px;
            padding:32px;
            box-shadow:0 20px 50px rgba(0,0,0,.2);
            animation:fadeUp .35s ease;
        }

        .auth-logo{
            width:75px;
            height:75px;
            margin:0 auto 15px;
            border-radius:50%;
            background:linear-gradient(135deg,var(--secondary),var(--primary));
            display:flex;
            align-items:center;
            justify-content:center;
            color:#fff;
            font-size:28px;
        }

        .auth-title{
            text-align:center;
            font-weight:700;
            margin-bottom:6px;
        }

        .auth-subtitle{
            text-align:center;
            color:var(--muted);
            margin-bottom:25px;
            font-size:.92rem;
        }

        .form-group label{
            font-weight:600;
            font-size:.9rem;
        }

        .form-control{
            border-radius:12px !important;
            border:1.5px solid var(--border);
            padding:12px 15px !important;
            transition:.2s;
            box-shadow:none !important;
        }

        .form-control:focus{
            border-color:var(--primary);
        }

        .form-control.is-invalid{
            border-color:var(--danger);
        }

        .invalid-feedback{
            display:block;
            font-size:.82rem;
        }

        textarea.form-control{
            border-radius:15px !important;
        }


        .btn-primary-custom{
            background:linear-gradient(135deg,var(--secondary),var(--primary));
            border:none;
            border-radius:12px;
            color:#fff;
            padding:11px 22px;
            font-weight:600;
            transition:.2s;
        }

        .btn-primary-custom:hover{
            color:#fff;
            transform:translateY(-1px);
            box-shadow:0 10px 20px rgba(118,75,162,.25);
        }

        .btn-outline-custom{
            border:1.5px solid var(--primary);
            color:var(--primary);
            border-radius:12px;
            padding:10px 20px;
            font-weight:600;
            background:#fff;
        }

        .btn-outline-custom:hover{
            background:var(--primary);
            color:#fff;
        }

        .sidebar{
            position:fixed;
            left:0;
            top:0;
            width:var(--sidebar-width);
            height:100vh;

            background:linear-gradient(180deg,#241338,#140b22);

            color:#fff;
            z-index:1000;

            display:flex;
            flex-direction:column;
        }

        .sidebar-brand{
            padding:24px 22px;
            border-bottom:1px solid rgba(255,255,255,.08);

            display:flex;
            align-items:center;
            gap:12px;
        }

        .sidebar-brand-icon{
            width:45px;
            height:45px;
            border-radius:14px;
            background:linear-gradient(135deg,var(--secondary),var(--primary));

            display:flex;
            align-items:center;
            justify-content:center;

            font-size:18px;
        }

        .sidebar-brand-title{
            font-size:1.1rem;
            font-weight:700;
        }

        .sidebar-brand-sub{
            font-size:.72rem;
            color:rgba(255,255,255,.45);
        }

        .sidebar-menu{
            flex:1;
            overflow-y:auto;
            padding:15px 10px;
        }

        .sidebar-section{
            margin-top:18px;
            margin-bottom:8px;

            padding:0 10px;

            font-size:.7rem;
            color:rgba(255,255,255,.35);

            text-transform:uppercase;
            letter-spacing:.08em;
            font-weight:700;
        }

        .sidebar-link{
            display:flex;
            align-items:center;
            gap:10px;

            padding:11px 14px;
            border-radius:12px;

            color:rgba(255,255,255,.72);

            transition:.2s;

            margin-bottom:4px;
        }

        .sidebar-link:hover{
            background:rgba(255,255,255,.08);
            color:#fff;
        }

        .sidebar-link.active{
            background:linear-gradient(135deg,var(--secondary),var(--primary));
            color:#fff;
            box-shadow:0 10px 20px rgba(118,75,162,.35);
        }

        .sidebar-link i{
            width:18px;
            text-align:center;
        }

        .sidebar-badge{
            margin-left:auto;

            background:var(--danger);

            color:#fff;
            font-size:.7rem;

            border-radius:30px;

            padding:2px 8px;
        }

        .sidebar-user{
            border-top:1px solid rgba(255,255,255,.08);
            padding:15px 10px;
        }

        .sidebar-user-card{
            display:flex;
            align-items:center;
            gap:10px;

            padding:10px;
            border-radius:12px;

            cursor:pointer;
        }

        .sidebar-user-card:hover{
            background:rgba(255,255,255,.08);
        }

        .user-avatar{
            width:42px;
            height:42px;

            border-radius:50%;

            background:linear-gradient(135deg,var(--secondary),var(--primary));

            display:flex;
            align-items:center;
            justify-content:center;

            font-weight:700;
            color:#fff;
        }

        .user-name{
            color:#fff;
            font-weight:600;
            font-size:.9rem;
        }

        .user-role{
            font-size:.72rem;
            color:rgba(255,255,255,.5);
        }

        .topbar{
    position:fixed;
    top:0;
    left:var(--sidebar-width);
    right:0;

    height:var(--topbar-height);

    background:rgba(255,255,255,.92);
    backdrop-filter:blur(10px);

    border-bottom:1px solid rgba(255,255,255,.2);

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 28px;

    z-index:999;
}

        .topbar-title{
            font-size:1.2rem;
            font-weight:700;
        }

        .topbar-sub{
            font-size:.82rem;
            color:var(--muted);
        }

        .topbar-actions{
            display:flex;
            align-items:center;
            gap:10px;
        }

        .icon-btn{
            width:42px;
            height:42px;

            border-radius:50%;
            border:1px solid var(--border);

            background:#fff;

            display:flex;
            align-items:center;
            justify-content:center;

            color:var(--muted);

            transition:.2s;
        }

        .icon-btn:hover{
            border-color:var(--primary);
            color:var(--primary);
        }


        .main-content {
    margin-left: var(--sidebar-width);
    margin-top: var(--topbar-height);
    padding: 28px;
    min-height: calc(100vh - var(--topbar-height));
    background: transparent;
}


        .page-header{
            display:flex;
            align-items:center;
            justify-content:space-between;

            margin-bottom:25px;
            gap:15px;
            flex-wrap:wrap;
        }

        .page-title{
            font-size:1.7rem;
            font-weight:700;
        }

        .page-description{
            color:var(--muted);
            margin-top:4px;
        }

        .app-card{
    background:rgba(255,255,255,.96);
    backdrop-filter:blur(10px);

    border-radius:18px;
    border:1px solid rgba(255,255,255,.25);

    box-shadow:0 8px 30px rgba(0,0,0,.12);

    overflow:hidden;
}

        .app-card .card-header{
            background:#fff;
            border-bottom:1px solid var(--border);
            padding:18px 22px;
            font-weight:700;
        }

        .app-card .card-body{
            padding:22px;
        }

        .smart-alert{
            border-radius:14px;
            padding:14px 18px;
            margin-bottom:20px;

            display:flex;
            align-items:flex-start;
            gap:12px;

            font-size:.92rem;
        }

        .smart-alert.success{
            background:#d4edda;
            color:#155724;
        }

        .smart-alert.danger{
            background:#f8d7da;
            color:#721c24;
        }

        .smart-alert.warning{
            background:#fff3cd;
            color:#856404;
        }

        .smart-alert.info{
            background:#d1ecf1;
            color:#0c5460;
        }

        .table-custom{
            width:100%;
        }

        .table-custom thead th{
            border-top:none;
            border-bottom:2px solid var(--border);

            font-size:.78rem;
            text-transform:uppercase;
            color:var(--muted);
            letter-spacing:.05em;
        }

        .table-custom td{
            vertical-align:middle;
        }

        .status-badge{
            display:inline-flex;
            align-items:center;
            gap:6px;

            padding:5px 12px;

            border-radius:30px;

            font-size:.76rem;
            font-weight:600;
        }

        .badge-pending{
            background:#fff3cd;
            color:#856404;
        }

        .badge-success{
            background:#d4edda;
            color:#155724;
        }

        .badge-danger{
            background:#f8d7da;
            color:#721c24;
        }

        .badge-info{
            background:#d1ecf1;
            color:#0c5460;
        }

        @keyframes fadeUp{
            from{
                opacity:0;
                transform:translateY(10px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @media(max-width:768px){

            .sidebar{
                transform:translateX(-100%);
                transition:.3s;
            }

            .sidebar.show{
                transform:translateX(0);
            }

            .topbar{
                left:0;
            }

            .main-content{
                margin-left:0;
            }
        }
    </style>
</head>

<div th:fragment="layout(content, role, active, pageTitle, breadcrumb)">

    <!-- SIDEBAR -->
    <nav class="sidebar" th:replace="~{layout/main-layout :: sidebar(role=${role}, active=${active})}"></nav>

    <!-- TOPBAR -->
    <header th:replace="~{layout/main-layout :: topbar(pageTitle=${pageTitle}, pageDesc=${breadcrumb})}"></header>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <!-- ALERTS -->
        <div th:replace="~{layout/main-layout :: alerts}"></div>

        <!-- PAGE CONTENT -->
        <div th:replace="${content}"></div>

    </div>

    <!-- SCRIPTS -->
    <div th:replace="~{layout/main-layout :: scripts}"></div>

</div>

<!-- ===================== SIDEBAR ===================== -->
<nav th:fragment="sidebar(role, active)" class="sidebar">

    <div class="sidebar-brand">
        <div class="sidebar-brand-icon">
            <i class="fas fa-flask"></i>
        </div>

        <div>
            <div class="sidebar-brand-title">Smart Lab</div>

            <div class="sidebar-brand-sub" th:text="${role}">
                STUDENT
            </div>
        </div>
    </div>

    <div class="sidebar-menu">

        <!-- STUDENT -->
        <div th:if="${role == 'STUDENT'}">

            <div class="sidebar-section">Sinh viên</div>

            <a th:href="@{/student/dashboard}"
               class="sidebar-link"
               th:classappend="${active == 'dashboard'} ? 'active'">
                <i class="fas fa-home"></i>
                Dashboard
            </a>

            <!-- CORE-05 -->
            <a th:href="@{/student/sessions/book}"
               class="sidebar-link"
               th:classappend="${active == 'booking'} ? 'active'">
                <i class="fas fa-calendar-plus"></i>
                Đặt lịch
            </a>

            <!-- CORE-05 / CORE-09 -->
            <a th:href="@{/student/sessions}"
               class="sidebar-link"
               th:classappend="${active == 'sessions'} ? 'active'">
                <i class="fas fa-calendar-check"></i>
                Lịch tư vấn
            </a>

            <!-- CORE-07 -->
            <a th:href="@{/student/history}"
               class="sidebar-link"
               th:classappend="${active == 'history'} ? 'active'">
                <i class="fas fa-history"></i>
                Hồ sơ học tập
            </a>

            <!-- CORE-06 / CORE-08 -->
            <a th:href="@{/student/borrowings}"
               class="sidebar-link"
               th:classappend="${active == 'borrowings'} ? 'active'">
                <i class="fas fa-box-open"></i>
                Thiết bị mượn
            </a>

        </div>

        <!-- LECTURER -->
        <div th:if="${role == 'LECTURER'}">

            <div class="sidebar-section">Giảng viên</div>

            <a th:href="@{/lecturer/dashboard}"
               class="sidebar-link"
               th:classappend="${active == 'dashboard'} ? 'active'">
                <i class="fas fa-chart-line"></i>
                Dashboard
            </a>

            <!-- CORE-06 -->
            <a th:href="@{/lecturer/sessions}"
               class="sidebar-link"
               th:classappend="${active == 'sessions'} ? 'active'">
                <i class="fas fa-users"></i>
                Buổi tư vấn
            </a>

            <!-- ✔ BỔ SUNG (CORE-06 DETAIL) -->
            <a th:href="@{/lecturer/evaluations}"
               class="sidebar-link"
               th:classappend="${active == 'evaluations'} ? 'active'">
                <i class="fas fa-clipboard-check"></i>
                Đánh giá sinh viên
            </a>

        </div>

        <!-- ADMIN -->
        <div th:if="${role == 'ADMIN'}">

            <div class="sidebar-section">Quản trị</div>

            <a th:href="@{/admin/dashboard}"
               class="sidebar-link"
               th:classappend="${active == 'dashboard'} ? 'active'">
                <i class="fas fa-chart-pie"></i>
                Dashboard
            </a>

            <!-- CORE-04 -->
            <a th:href="@{/admin/equipments}"
               class="sidebar-link"
               th:classappend="${active == 'equipments'} ? 'active'">
                <i class="fas fa-tools"></i>
                Thiết bị
            </a>

            <!-- CORE-08 -->
            <a th:href="@{/admin/borrowings}"
               class="sidebar-link"
               th:classappend="${active == 'borrowings'} ? 'active'">
                <i class="fas fa-boxes"></i>
                Cấp phát
            </a>

            <!-- CORE-05 monitoring -->
            <a th:href="@{/admin/sessions}"
               class="sidebar-link"
               th:classappend="${active == 'sessions'} ? 'active'">
                <i class="fas fa-calendar"></i>
                Lịch tư vấn
            </a>

            <!-- ✔ BỔ SUNG THEO SRS (seed data) -->
            <a th:href="@{/admin/departments}"
               class="sidebar-link"
               th:classappend="${active == 'departments'} ? 'active'">
                <i class="fas fa-sitemap"></i>
                Khoa / Ngành
            </a>

            <a th:href="@{/admin/lab-types}"
               class="sidebar-link"
               th:classappend="${active == 'lab-types'} ? 'active'">
                <i class="fas fa-vials"></i>
                Loại phòng Lab
            </a>

        </div>
    </div>

    <!-- USER -->
    <div class="sidebar-user">

        <div class="dropdown">

            <div class="sidebar-user-card dropdown-toggle"
                 data-toggle="dropdown">

                <div class="user-avatar"
                     th:text="${#strings.substring(sessionUser.fullName,0,1)}">
                </div>

                <div>
                    <div class="user-name"
                         th:text="${sessionUser.fullName}">
                    </div>

                    <div class="user-role"
                         th:text="${role}">
                    </div>
                </div>
            </div>

            <div class="dropdown-menu">

                <a class="dropdown-item" th:href="@{/profile}">
                    <i class="fas fa-user mr-2"></i>
                    Hồ sơ
                </a>

                <div class="dropdown-divider"></div>

                <a class="dropdown-item text-danger" th:href="@{/auth/logout}">
                    <i class="fas fa-sign-out-alt mr-2"></i>
                    Đăng xuất
                </a>

            </div>
        </div>
    </div>
</nav>

<!-- ===================== TOPBAR ===================== -->
<header th:fragment="topbar(pageTitle, pageDesc)" class="topbar">

    <div>
        <div class="topbar-title" th:text="${pageTitle}"></div>
        <div class="topbar-sub" th:text="${pageDesc}"></div>
    </div>

</header>

<!-- ===================== ALERTS ===================== -->
<div th:fragment="alerts">

    <div th:if="${successMsg}" class="smart-alert success">
        <span th:text="${successMsg}"></span>
    </div>

    <div th:if="${errorMsg}" class="smart-alert danger">
        <span th:text="${errorMsg}"></span>
    </div>

</div>

<!-- ===================== SCRIPTS ===================== -->
<div th:fragment="scripts">

    <!-- 1. jQuery -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>

    <!-- 2. Popper.js (BẮT BUỘC) -->
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js"></script>

    <!-- 3. Bootstrap -->
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

</div>

</html>
